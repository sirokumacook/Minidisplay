<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Display v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: rgba(255, 255, 255, 0.95);
            --text-sub: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(30, 30, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --font-ja: 'DefaultFontJa', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            --font-en: 'DefaultFontEn', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            --curtain-color: #ff8c00; /* デフォルトのオレンジ */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            color: var(--text-main);
            font-family: var(--font-ja);
            transition: background-image 0.5s ease;
        }

        @font-face { font-family: 'DefaultFontJa'; src: local('sans-serif'); }
        @font-face { font-family: 'DefaultFontEn'; src: local('Arial'); }

        .en-font, 
        .side-time, .side-sec, 
        .huge-clock-time, 
        .weather-main-temp, .forecast-date, .forecast-temp,
        .news-header {
            font-family: var(--font-en);
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        /* サイド時計コンテナ（カーテン制約用） */
        #side-clock-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            border-radius: 12px;
            overflow: hidden;
        }

        #side-clock-content {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: baseline;
            padding: 10px 20px;
            opacity: 0;
        }

        .side-time {
            font-size: 2.5vw;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .side-sec {
            font-size: 1.2vw;
            color: var(--text-sub);
            margin-left: 5px;
        }

        /* メインコンテンツエリア */
        #main-content {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* カーテン制約用 */
        }

        .mode-panel {
            position: absolute;
            width: calc(100% - 100px);
            height: calc(100% - 120px);
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            /* カーテンの裏で切り替わるためtransitionは不要 */
        }

        .mode-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 時計モード */
        #mode-time {
            width: 80%;
            height: 80%;
            margin-top: 0;
        }
        .huge-clock-time {
            font-size: 12vw;
            font-weight: 200;
            line-height: 1;
            letter-spacing: 5px;
        }
        .huge-clock-date {
            font-size: 3vw;
            color: var(--text-sub);
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* 天気モード */
        .weather-sub-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .weather-sub-panel.active {
            display: flex;
        }
        .weather-title {
            font-size: 2vw;
            color: var(--text-sub);
            margin-bottom: 20px;
        }
        .weather-main-temp {
            font-size: 8vw;
            font-weight: 300;
            line-height: 1;
        }
        .weather-desc {
            font-size: 3vw;
            margin: 20px 0;
        }
        .weather-minmax {
            font-size: 2vw;
            color: var(--text-sub);
        }
        /* 気温の色分け */
        .temp-max { color: #ff6b6b; font-weight: bold; }
        .temp-min { color: #4dabf7; font-weight: bold; }

        .forecast-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 30px;
        }
        .forecast-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 16px;
            width: 18%;
        }
        .forecast-date { font-size: 1.5vw; margin-bottom: 10px; }
        .forecast-desc { font-size: 1.5vw; margin-bottom: 10px; line-height: 1.4; }
        .forecast-temp { font-size: 1.2vw; }

        /* ニュースモード */
        .news-container {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-between;
        }
        .news-text-area {
            flex: 1;
            padding-right: 40px;
        }
        .news-header {
            font-size: 1.5vw;
            color: var(--text-sub);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .news-title {
            font-size: 3.5vw;
            font-weight: 400;
            line-height: 1.4;
        }
        .news-qr-area {
            width: 300px;
            height: 300px;
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* カーテンアニメーション用 */
        .curtain-overlay {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--curtain-color);
            z-index: 9999;
        }

        /* 設定サイドバー */
        #settings-sidebar {
            position: absolute;
            top: 0;
            left: -400px;
            width: 400px;
            height: 100%;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            z-index: 10000;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #settings-sidebar.open {
            left: 0;
        }

        .settings-title {
            font-size: 24px;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        .form-group input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
        }

        .form-group input[type="file"] {
            width: 100%;
            color: var(--text-sub);
            font-size: 14px;
        }

        .save-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .save-btn:hover {
            background: rgba(255,255,255,0.8);
        }

        #swipe-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 30px;
            height: 100%;
            z-index: 50;
        }
    </style>
</head>
<body>

    <style id="dynamic-styles"></style>
    <div id="swipe-zone"></div>

    <div class="container">
        <div id="side-clock-container">
            <div id="side-clock-content">
                <div class="side-time" id="side-time-display">00:00</div>
                <div class="side-sec" id="side-sec-display">00</div>
            </div>
        </div>

        <div id="main-content">
            <div id="mode-time" class="mode-panel">
                <div class="huge-clock-time" id="main-time-display">00:00:00</div>
                <div class="huge-clock-date" id="main-date-display">1月1日(月)</div>
            </div>

            <div id="mode-weather" class="mode-panel">
                <div id="weather-today" class="weather-sub-panel">
                    <div class="weather-title">今日の天気</div>
                    <div class="weather-desc" id="wt-desc">取得中...</div>
                    <div class="weather-main-temp" id="wt-temp">--°C</div>
                    <div class="weather-minmax">
                        最高: <span class="temp-max en-font" id="wt-max">--°C</span> / 最低: <span class="temp-min en-font" id="wt-min">--°C</span>
                    </div>
                </div>
                <div id="weather-forecast" class="weather-sub-panel">
                    <div class="weather-title">明日からの天気</div>
                    <div class="forecast-container" id="forecast-box">
                        </div>
                </div>
            </div>

            <div id="mode-news" class="mode-panel">
                <div class="news-container">
                    <div class="news-text-area">
                        <div class="news-header">LATEST NEWS</div>
                        <div class="news-title" id="news-title-display">ニュースを取得中...</div>
                    </div>
                    <div class="news-qr-area">
                        <canvas id="news-qr"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-sidebar">
        <div class="settings-title">設定</div>
        
        <div class="form-group">
            <label>切り替え頻度 (秒)</label>
            <input type="number" id="input-interval" min="10" placeholder="例: 60">
        </div>
        <div class="form-group">
            <label>カーテンの色</label>
            <input type="color" id="input-curtain">
        </div>
        <div class="form-group">
            <label>緯度 (Latitude)</label>
            <input type="number" step="0.000001" id="input-lat">
        </div>
        <div class="form-group">
            <label>経度 (Longitude)</label>
            <input type="number" step="0.000001" id="input-lon">
        </div>
        <div class="form-group">
            <label>Yahooニュース RSS URL</label>
            <input type="text" id="input-rss">
        </div>
        <div class="form-group">
            <label>日本語フォント (通常テキスト)</label>
            <input type="file" id="input-font-ja" accept=".ttf,.otf,.woff,.woff2">
        </div>
        <div class="form-group">
            <label>英語・数字フォント (時計・温度など)</label>
            <input type="file" id="input-font-en" accept=".ttf,.otf,.woff,.woff2">
        </div>
        <div class="form-group">
            <label>背景画像</label>
            <input type="file" id="input-bg" accept="image/*">
        </div>
        
        <button class="save-btn" onclick="saveSettings()">保存して適用</button>
    </div>

    <script>
        // --- 設定管理 ---
        const DEFAULT_SETTINGS = {
            interval: 60,
            curtainColor: '#ff8c00',
            lat: 35.6895, 
            lon: 139.6917,
            rssUrl: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
            fontDataJa: null, 
            fontDataEn: null, 
            bgData: null
        };

        let currentSettings = { ...DEFAULT_SETTINGS };
        const qr = new QRious({ element: document.getElementById('news-qr'), size: 260 });

        async function loadSettings() {
            const saved = await localforage.getItem('smartDisplaySettings');
            if (saved) {
                currentSettings = { ...DEFAULT_SETTINGS, ...saved };
            }
            
            document.getElementById('input-interval').value = currentSettings.interval;
            document.getElementById('input-curtain').value = currentSettings.curtainColor;
            document.getElementById('input-lat').value = currentSettings.lat;
            document.getElementById('input-lon').value = currentSettings.lon;
            document.getElementById('input-rss').value = currentSettings.rssUrl;

            applyCustomStyles();
            fetchWeather();
            fetchNews();
        }

        async function saveSettings() {
            currentSettings.interval = parseInt(document.getElementById('input-interval').value) || DEFAULT_SETTINGS.interval;
            currentSettings.curtainColor = document.getElementById('input-curtain').value || DEFAULT_SETTINGS.curtainColor;
            currentSettings.lat = parseFloat(document.getElementById('input-lat').value) || DEFAULT_SETTINGS.lat;
            currentSettings.lon = parseFloat(document.getElementById('input-lon').value) || DEFAULT_SETTINGS.lon;
            currentSettings.rssUrl = document.getElementById('input-rss').value || DEFAULT_SETTINGS.rssUrl;

            const fontFileJa = document.getElementById('input-font-ja').files[0];
            if (fontFileJa) currentSettings.fontDataJa = await readFileAsDataURL(fontFileJa);

            const fontFileEn = document.getElementById('input-font-en').files[0];
            if (fontFileEn) currentSettings.fontDataEn = await readFileAsDataURL(fontFileEn);

            const bgFile = document.getElementById('input-bg').files[0];
            if (bgFile) currentSettings.bgData = await readFileAsDataURL(bgFile);

            await localforage.setItem('smartDisplaySettings', currentSettings);
            applyCustomStyles();
            
            // すぐに反映させるための再フェッチ
            fetchWeather();
            fetchNews();
            globalSeconds = 0; // サイクルをリセット
            
            document.getElementById('settings-sidebar').classList.remove('open');
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function applyCustomStyles() {
            let styleContent = '';
            
            document.documentElement.style.setProperty('--curtain-color', currentSettings.curtainColor);

            if (currentSettings.bgData) {
                document.body.style.backgroundImage = `url(${currentSettings.bgData})`;
            }

            if (currentSettings.fontDataJa) {
                styleContent += `@font-face { font-family: 'CustomUserFontJa'; src: url(${currentSettings.fontDataJa}); }`;
                document.documentElement.style.setProperty('--font-ja', "'CustomUserFontJa', sans-serif");
            }

            if (currentSettings.fontDataEn) {
                styleContent += `@font-face { font-family: 'CustomUserFontEn'; src: url(${currentSettings.fontDataEn}); }`;
                document.documentElement.style.setProperty('--font-en', "'CustomUserFontEn', sans-serif");
            }

            document.getElementById('dynamic-styles').textContent = styleContent;
        }

        // --- カーテンアニメーション ---
        function playCurtain(containerId, onCovered) {
            const container = document.getElementById(containerId);
            let curtain = container.querySelector('.curtain-overlay');
            if (!curtain) {
                curtain = document.createElement('div');
                curtain.className = 'curtain-overlay';
                container.appendChild(curtain);
            }
            
            // 初期状態へリセット
            curtain.style.transition = 'none';
            curtain.style.left = '-100%';
            
            // Reflow強制
            void curtain.offsetWidth;
            
            // スライドイン
            curtain.style.transition = 'left 0.4s cubic-bezier(0.65, 0, 0.35, 1)';
            curtain.style.left = '0';
            
            setTimeout(() => {
                // 完全に覆った瞬間にコールバックを実行してDOM書き換え
                if(onCovered) onCovered();
                
                // スライドアウト
                curtain.style.left = '100%';
                
                setTimeout(() => {
                    // 次のアニメーションのために待機位置へ戻す
                    curtain.style.transition = 'none';
                    curtain.style.left = '-100%';
                }, 400);
            }, 400);
        }

        // --- スワイプ処理 ---
        let touchstartX = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchendX - touchstartX > 50 && touchstartX < 50) {
                document.getElementById('settings-sidebar').classList.add('open');
            }
            if (touchstartX - touchendX > 50) {
                document.getElementById('settings-sidebar').classList.remove('open');
            }
        });

        // --- データ取得 ---
        let weatherData = null;
        let newsData = [];

        function getWeatherDisplay(code) {
            if (code === 0) return { icon: '☀️', text: '快晴' };
            if (code === 1 || code === 2 || code === 3) return { icon: '⛅', text: '晴れ / 曇り' };
            if (code >= 45 && code <= 48) return { icon: '🌫️', text: '霧' };
            if (code >= 51 && code <= 55) return { icon: '🌧️', text: '霧雨' };
            if (code >= 61 && code <= 65) return { icon: '☔', text: '雨' };
            if (code >= 71 && code <= 77) return { icon: '❄️', text: '雪' };
            if (code >= 80 && code <= 82) return { icon: '🌦️', text: 'にわか雨' };
            if (code >= 85 && code <= 86) return { icon: '🌨️', text: 'にわか雪' };
            if (code >= 95 && code <= 99) return { icon: '⛈️', text: '雷雨' };
            return { icon: '❓', text: '不明' };
        }

        async function fetchWeather() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentSettings.lat}&longitude=${currentSettings.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia/Tokyo`;
            try {
                const res = await fetch(url);
                weatherData = await res.json();
            } catch (e) {
                console.error("Weather fetch error", e);
            }
        }

        async function fetchNews() {
            // CORS回避とXMLパースのために AllOrigins を使用
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(currentSettings.rssUrl)}`;
            try {
                const res = await fetch(proxyUrl);
                const json = await res.json();
                const parser = new DOMParser();
                const doc = parser.parseFromString(json.contents, 'application/xml');
                const items = doc.querySelectorAll('item');
                
                let newNewsData = [];
                for (let i = 0; i < items.length && newNewsData.length < 5; i++) {
                    const title = items[i].querySelector('title')?.textContent;
                    const link = items[i].querySelector('link')?.textContent;
                    if (title && link) {
                        newNewsData.push({ title, link });
                    }
                }
                if (newNewsData.length > 0) {
                    newsData = newNewsData;
                }
            } catch (e) {
                console.error("News fetch error", e);
            }
        }

        // --- 画面更新ロジック ---
        let globalSeconds = 0;
        let currentMode = null; // 'time', 'weather', 'news'
        let currentWeatherMode = null; // 'today', 'forecast'
        let currentNewsIndex = null;
        let isSideClockVisible = false;

        function updateDisplays() {
            const now = new Date();
            
            // 時計のテキスト更新（毎秒）
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateStr = `${now.getMonth() + 1}月${now.getDate()}日(${days[now.getDay()]})`;

            document.getElementById('side-time-display').textContent = `${h}:${m}`;
            document.getElementById('side-sec-display').textContent = s;
            document.getElementById('main-time-display').textContent = `${h}:${m}:${s}`;
            document.getElementById('main-date-display').textContent = dateStr;

            // 定期的なデータ取得
            if (globalSeconds > 0 && globalSeconds % 60 === 0) fetchNews();
            if (globalSeconds > 0 && globalSeconds % 3600 === 0) fetchWeather();

            // 状態計算
            const interval = currentSettings.interval;
            const cycleSec = globalSeconds % (interval * 3);
            
            let nextMode = '';
            let nextWeatherMode = '';
            let nextNewsIndex = 0;
            
            if (cycleSec < interval) {
                nextMode = 'time';
            } else if (cycleSec < interval * 2) {
                nextMode = 'weather';
                nextWeatherMode = ((cycleSec - interval) < (interval / 2)) ? 'today' : 'forecast';
            } else {
                nextMode = 'news';
                // ニュースはintervalの間に均等に切り替え（最大5件、デフォは20秒ごとに3件表示）
                const newsDuration = interval / 3;
                nextNewsIndex = Math.floor((cycleSec - interval * 2) / newsDuration);
                // 記事数が少ない場合の安全策
                if (newsData.length > 0) {
                    nextNewsIndex = nextNewsIndex % newsData.length;
                }
            }

            const nextSideClockVisible = (nextMode !== 'time');

            // 変化チェック
            const mainNeedsCurtain = (currentMode !== nextMode) || 
                                     (nextMode === 'weather' && currentWeatherMode !== nextWeatherMode) || 
                                     (nextMode === 'news' && currentNewsIndex !== nextNewsIndex);
            
            const sideNeedsCurtain = (isSideClockVisible !== nextSideClockVisible);

            // メインコンテンツの更新
            if (mainNeedsCurtain) {
                playCurtain('main-content', () => {
                    applyMainContentDOM(nextMode, nextWeatherMode, nextNewsIndex);
                });
                currentMode = nextMode;
                currentWeatherMode = nextWeatherMode;
                currentNewsIndex = nextNewsIndex;
            } else if (currentMode === null) {
                // 初回起動時
                applyMainContentDOM(nextMode, nextWeatherMode, nextNewsIndex);
                currentMode = nextMode;
            }

            // サイド時計の更新
            if (sideNeedsCurtain) {
                const sideContent = document.getElementById('side-clock-content');
                if (nextSideClockVisible) {
                    // 表示される時: カーテンで覆ってから中身を見せる
                    playCurtain('side-clock-container', () => {
                        sideContent.style.opacity = '1';
                    });
                } else {
                    // 消える時: カーテンで覆ってから中身を隠す
                    playCurtain('side-clock-container', () => {
                        sideContent.style.opacity = '0';
                    });
                }
                isSideClockVisible = nextSideClockVisible;
            } else if (isSideClockVisible && sideContent && sideContent.style.opacity === '0') {
                 // 初回表示用セーフティ
                 sideContent.style.opacity = '1';
            }

            globalSeconds++;
        }

        function applyMainContentDOM(mode, weatherMode, newsIndex) {
            const pTime = document.getElementById('mode-time');
            const pWeather = document.getElementById('mode-weather');
            const pNews = document.getElementById('mode-news');
            
            pTime.classList.remove('active');
            pWeather.classList.remove('active');
            pNews.classList.remove('active');
            
            if (mode === 'time') pTime.classList.add('active');
            
            if (mode === 'weather') {
                pWeather.classList.add('active');
                const pToday = document.getElementById('weather-today');
                const pForecast = document.getElementById('weather-forecast');
                
                if (weatherMode === 'today') {
                    pToday.classList.add('active');
                    pForecast.classList.remove('active');
                    
                    if (weatherData && weatherData.current_weather) {
                        const cw = weatherData.current_weather;
                        const daily = weatherData.daily;
                        const wd = getWeatherDisplay(cw.weathercode);
                        
                        document.getElementById('wt-desc').textContent = `${wd.icon} ${wd.text}`;
                        document.getElementById('wt-temp').textContent = `${cw.temperature}°C`;
                        document.getElementById('wt-max').textContent = `${daily.temperature_2m_max[0]}°C`;
                        document.getElementById('wt-min').textContent = `${daily.temperature_2m_min[0]}°C`;
                    }
                } else {
                    pToday.classList.remove('active');
                    pForecast.classList.add('active');
                    
                    if (weatherData && weatherData.daily) {
                        const daily = weatherData.daily;
                        const box = document.getElementById('forecast-box');
                        box.innerHTML = ''; 
                        
                        for (let i = 1; i <= 5; i++) {
                            const dateObj = new Date(daily.time[i]);
                            const dStr = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                            const wd = getWeatherDisplay(daily.weathercode[i]);
                            const maxT = daily.temperature_2m_max[i];
                            const minT = daily.temperature_2m_min[i];

                            box.insertAdjacentHTML('beforeend', `
                                <div class="forecast-item">
                                    <div class="forecast-date en-font">${dStr}</div>
                                    <div class="forecast-desc">${wd.icon}<br>${wd.text}</div>
                                    <div class="forecast-temp en-font">
                                        <span class="temp-max">${maxT}°</span> / <span class="temp-min">${minT}°</span>
                                    </div>
                                </div>
                            `);
                        }
                    }
                }
            }

            if (mode === 'news') {
                pNews.classList.add('active');
                if (newsData.length > 0 && newsData[newsIndex]) {
                    const item = newsData[newsIndex];
                    document.getElementById('news-title-display').textContent = item.title;
                    qr.set({ value: item.link });
                } else {
                    document.getElementById('news-title-display').textContent = 'ニュースを取得中です...';
                }
            }
        }

        // 初期化
        loadSettings().then(() => {
            setInterval(updateDisplays, 1000);
            updateDisplays();
        });

    </script>
</body>
</html>
