<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Display v8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: rgba(255, 255, 255, 0.95);
            --text-sub: rgba(255, 255, 255, 0.6);
            --glass-bg-standard: rgba(30, 30, 30, 0.4);
            --glass-border-standard: rgba(255, 255, 255, 0.1);
            --glass-shadow-standard: 0 20px 40px rgba(0, 0, 0, 0.5);
            
            --blur-amount: 20px;
            --font-ja: 'DefaultFontJa', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            --font-en: 'DefaultFontEn', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --curtain-color: #ff8c00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            /* 縮小やスクロールを完全に防止 */
            overflow: hidden;
            position: fixed; 
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            color: var(--text-main);
            font-family: var(--font-ja);
            transition: background-image 0.5s ease;
        }

        @font-face { font-family: 'DefaultFontJa'; src: local('sans-serif'); }
        @font-face { font-family: 'DefaultFontEn'; src: local('Arial'); }

        .en-font {
            font-family: var(--font-en) !important;
        }

        /* 画面外にはみ出たものを確実に隠すためのコンテナ */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            justify-content: center;
            align-items: center;
        }

        /* 共通ガラススタイル */
        .glass-panel {
            background: var(--glass-bg-standard);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border-standard);
            box-shadow: var(--glass-shadow-standard);
            position: relative;
        }

        .glass-panel.liquid {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255,255,255,0.1);
        }

        /* カーテン要素 */
        .curtain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--curtain-color);
            z-index: 9999;
            pointer-events: none;
            transform: translateX(-100%);
        }

        /* 左上サイド時計 */
        #side-ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            border-radius: 12px;
            overflow: hidden;
        }

        #side-ui-panel {
            padding: 10px 20px;
            display: flex;
            align-items: baseline;
            opacity: 0; 
            border-radius: inherit;
        }

        .side-time { font-size: 2.5vw; font-weight: 300; letter-spacing: 1px; }
        .side-sec { font-size: 1.2vw; color: var(--text-sub); margin-left: 5px; }

        /* 右上タイマー */
        #timer-ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            border-radius: 12px;
            overflow: hidden;
        }

        #timer-ui-panel {
            padding: 10px 20px;
            display: flex;
            align-items: baseline;
            opacity: 0; 
            border-radius: inherit;
        }

        .timer-label { font-size: 1vw; color: var(--text-sub); margin-right: 15px; letter-spacing: 2px; }
        .timer-time { font-size: 2.5vw; font-weight: 300; letter-spacing: 1px; }

        /* メインパネル */
        #main-ui-panel {
            width: calc(100% - 100px);
            height: calc(100% - 120px);
            margin-top: 60px;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .mode-content {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .mode-content.active { display: flex; }

        /* 時計モード */
        .huge-clock-time { font-size: 12vw; font-weight: 200; line-height: 1; letter-spacing: 5px; }
        .huge-clock-date { font-size: 3vw; color: var(--text-sub); margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; }

        /* 天気モード */
        .weather-sub-panel {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .weather-sub-panel.active { display: flex; }
        .weather-location { font-size: 1.5vw; color: var(--text-main); letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .weather-title { font-size: 1.5vw; color: var(--text-sub); margin-bottom: 20px; letter-spacing: 3px; }
        .weather-main-temp { font-size: 8vw; font-weight: 300; line-height: 1; }
        .weather-desc { font-size: 3vw; margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; }
        .weather-minmax { font-size: 2vw; color: var(--text-sub); }
        .temp-max { color: #ff6b6b; font-weight: bold; }
        .temp-min { color: #4dabf7; font-weight: bold; }

        .forecast-container { display: flex; justify-content: space-between; width: 100%; margin-top: 30px; }
        .forecast-item { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; width: 18%; }
        .forecast-date { font-size: 1.5vw; margin-bottom: 15px; text-transform: uppercase; }
        .forecast-desc { font-size: 1.5vw; margin-bottom: 15px; line-height: 1.4; text-transform: uppercase; }
        .forecast-temp { font-size: 1.2vw; }

        /* ニュースモード */
        .news-container { display: flex; width: 100%; height: 100%; align-items: center; justify-content: space-between; }
        .news-text-area { flex: 1; padding-right: 40px; text-align: left; }
        .news-header { font-size: 1.5vw; color: var(--text-sub); margin-bottom: 20px; letter-spacing: 2px; }
        .news-title { font-size: 3.5vw; font-weight: 400; line-height: 1.4; }
        .news-qr-area { width: 300px; height: 300px; background: #fff; padding: 20px; border-radius: 16px; display: flex; justify-content: center; align-items: center; }

        /* サイドバー共通 (表示領域外への配置方法を修正) */
        .sidebar {
            position: absolute;
            top: 0;
            width: 400px;
            max-width: 100vw;
            height: 100%;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 10000;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #settings-sidebar {
            left: -400px;
            border-right: 1px solid var(--glass-border-standard);
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #settings-sidebar.open { left: 0; }

        #timer-sidebar {
            right: -400px;
            border-left: 1px solid var(--glass-border-standard);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #timer-sidebar.open { right: 0; }

        .settings-title { font-size: 24px; margin-bottom: 30px; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border-standard); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 5px; }
        .form-group input[type="text"], .form-group input[type="number"], .form-group input[type="time"], .form-group select {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border-standard); border-radius: 8px; color: #fff; font-size: 14px; outline: none;
        }
        .form-group input[type="range"] { width: 100%; padding: 0; height: 4px; }
        .form-group input[type="color"] { width: 100%; height: 35px; border: none; background: none; cursor: pointer; }
        .form-group input[type="file"] { width: 100%; color: var(--text-sub); font-size: 12px; }

        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }

        .btn {
            background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; width: 100%;
        }
        .btn:hover { background: rgba(255,255,255,0.8); }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #ff6b81; }
        .btn-secondary { background: transparent; color: #fff; border: 1px solid var(--glass-border-standard); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* スワイプ検知用エリア */
        .swipe-zone { position: absolute; top: 0; width: 30px; height: 100%; z-index: 50; }
        #swipe-zone-left { left: 0; }
        #swipe-zone-right { right: 0; }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <style id="dynamic-styles"></style>
    
    <div class="wrapper">
        <div id="swipe-zone-left" class="swipe-zone"></div>
        <div id="swipe-zone-right" class="swipe-zone"></div>

        <div class="container">
            
            <div id="side-ui-container">
                <div id="side-ui-panel" class="glass-panel">
                    <div class="side-time en-font" id="side-time-display">00:00</div>
                    <div class="side-sec en-font" id="side-sec-display">00</div>
                </div>
                <div class="curtain-overlay"></div>
            </div>

            <div id="timer-ui-container">
                <div id="timer-ui-panel" class="glass-panel">
                    <div class="timer-label en-font">TIMER</div>
                    <div class="timer-time en-font" id="timer-display">00:00:00</div>
                </div>
                <div class="curtain-overlay"></div>
            </div>

            <div id="main-ui-panel" class="glass-panel">
                <div id="mode-time" class="mode-content">
                    <div class="huge-clock-time en-font" id="main-time-display">00:00:00</div>
                    <div class="huge-clock-date en-font" id="main-date-display">MON, JAN 1</div>
                </div>

                <div id="mode-weather" class="mode-content">
                    <div id="weather-today" class="weather-sub-panel">
                        <div class="weather-location en-font" id="location-name-today">--</div>
                        <div class="weather-title en-font">TODAY'S WEATHER</div>
                        <div class="weather-desc en-font" id="wt-desc">Loading...</div>
                        <div class="weather-main-temp en-font" id="wt-temp">--°C</div>
                        <div class="weather-minmax">
                            <span class="temp-max en-font" id="wt-max">--°C</span> <span class="en-font">/</span> <span class="temp-min en-font" id="wt-min">--°C</span>
                        </div>
                    </div>
                    
                    <div id="weather-forecast" class="weather-sub-panel">
                        <div class="weather-location en-font" id="location-name-forecast">--</div>
                        <div class="weather-title en-font">5-DAY FORECAST</div>
                        <div class="forecast-container" id="forecast-box"></div>
                    </div>
                </div>

                <div id="mode-news" class="mode-content">
                    <div class="news-container">
                        <div class="news-text-area">
                            <div class="news-header en-font">LATEST NEWS</div>
                            <div class="news-title" id="news-title-display">ニュースを取得中...</div>
                        </div>
                        <div class="news-qr-area">
                            <canvas id="news-qr"></canvas>
                        </div>
                    </div>
                </div>

                <div class="curtain-overlay"></div>
            </div>
        </div>

        <div id="settings-sidebar" class="sidebar">
            <div class="settings-title">設定</div>
            
            <div class="form-group">
                <label>UIデザイン</label>
                <select id="input-glass-style">
                    <option value="standard">Standard Glass</option>
                    <option value="liquid">Liquid Glass</option>
                </select>
            </div>
            <div class="form-group">
                <label>UIのぼかし具合</label>
                <input type="range" id="input-blur" min="0" max="50">
            </div>
            <div class="form-group">
                <label>カーテンの色</label>
                <input type="color" id="input-curtain">
            </div>
            <div class="form-group">
                <label>時計の表示秒数 (デフォルト 60)</label>
                <input type="number" id="input-time-sec" min="10">
            </div>
            <div class="form-group">
                <label>天気の表示秒数 (デフォルト 60)</label>
                <input type="number" id="input-weather-sec" min="10">
            </div>
            <div class="form-group">
                <label>ニュースの表示秒数 (デフォルト 60)</label>
                <input type="number" id="input-news-sec" min="10">
            </div>
            <div class="form-group flex-row">
                <div>
                    <label>緯度 (Lat)</label>
                    <input type="number" step="0.000001" id="input-lat">
                </div>
                <div>
                    <label>経度 (Lon)</label>
                    <input type="number" step="0.000001" id="input-lon">
                </div>
            </div>
            <div class="form-group">
                <label>Yahoo RSS URL</label>
                <input type="text" id="input-rss">
            </div>
            <div class="form-group">
                <label>日本語フォント</label>
                <input type="file" id="input-font-ja" accept=".ttf,.otf,.woff,.woff2">
            </div>
            <div class="form-group">
                <label>英語・数字フォント</label>
                <input type="file" id="input-font-en" accept=".ttf,.otf,.woff,.woff2">
            </div>
            <div class="form-group">
                <label>背景画像</label>
                <input type="file" id="input-bg" accept="image/*">
            </div>
            
            <button class="btn" onclick="saveSettings()">保存して適用</button>
        </div>

        <div id="timer-sidebar" class="sidebar">
            <div class="settings-title">タイマー設定</div>
            
            <div class="form-group">
                <label>モード</label>
                <select id="timer-mode-select" onchange="switchTimerMode()">
                    <option value="duration">時間指定 (Countdown)</option>
                    <option value="target">時刻指定 (Target Time)</option>
                </select>
            </div>

            <div id="timer-duration-inputs" class="form-group flex-row">
                <div>
                    <label>時間</label>
                    <input type="number" id="timer-hours" min="0" max="99" value="0">
                </div>
                <div>
                    <label>分</label>
                    <input type="number" id="timer-minutes" min="0" max="59" value="5">
                </div>
            </div>

            <div id="timer-target-inputs" class="form-group hidden">
                <label>終了時刻</label>
                <input type="time" id="timer-target-time">
            </div>
            
            <button class="btn" id="btn-timer-start" onclick="startTimer()">スタート</button>
            <div class="flex-row" style="margin-top:10px;">
                <button class="btn btn-secondary" id="btn-timer-stop" onclick="stopTimer()" disabled>ストップ</button>
                <button class="btn btn-danger" id="btn-timer-reset" onclick="resetTimer()" disabled>リセット</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_SETTINGS = {
            glassStyle: 'standard',
            timeSec: 60, weatherSec: 60, newsSec: 60,
            blurAmount: 20, curtainColor: '#ff8c00',
            lat: 35.6895, lon: 139.6917,
            rssUrl: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
            fontDataJa: null, fontDataEn: null, bgData: null
        };

        let currentSettings = { ...DEFAULT_SETTINGS };
        const qr = new QRious({ element: document.getElementById('news-qr'), size: 260 });

        async function loadSettings() {
            const saved = await localforage.getItem('smartDisplaySettings');
            if (saved) currentSettings = { ...DEFAULT_SETTINGS, ...saved };
            
            document.getElementById('input-glass-style').value = currentSettings.glassStyle || 'standard';
            document.getElementById('input-time-sec').value = currentSettings.timeSec;
            document.getElementById('input-weather-sec').value = currentSettings.weatherSec;
            document.getElementById('input-news-sec').value = currentSettings.newsSec;
            document.getElementById('input-blur').value = currentSettings.blurAmount;
            document.getElementById('input-curtain').value = currentSettings.curtainColor;
            document.getElementById('input-lat').value = currentSettings.lat;
            document.getElementById('input-lon').value = currentSettings.lon;
            document.getElementById('input-rss').value = currentSettings.rssUrl;

            applyCustomStyles();
            fetchLocationName();
            fetchWeather();
            fetchNews();
        }

        async function saveSettings() {
            currentSettings.glassStyle = document.getElementById('input-glass-style').value;
            currentSettings.timeSec = parseInt(document.getElementById('input-time-sec').value) || DEFAULT_SETTINGS.timeSec;
            currentSettings.weatherSec = parseInt(document.getElementById('input-weather-sec').value) || DEFAULT_SETTINGS.weatherSec;
            currentSettings.newsSec = parseInt(document.getElementById('input-news-sec').value) || DEFAULT_SETTINGS.newsSec;
            currentSettings.blurAmount = parseInt(document.getElementById('input-blur').value) || 0;
            currentSettings.curtainColor = document.getElementById('input-curtain').value || DEFAULT_SETTINGS.curtainColor;
            currentSettings.lat = parseFloat(document.getElementById('input-lat').value) || DEFAULT_SETTINGS.lat;
            currentSettings.lon = parseFloat(document.getElementById('input-lon').value) || DEFAULT_SETTINGS.lon;
            currentSettings.rssUrl = document.getElementById('input-rss').value || DEFAULT_SETTINGS.rssUrl;

            const fontFileJa = document.getElementById('input-font-ja').files[0];
            if (fontFileJa) currentSettings.fontDataJa = await readFileAsDataURL(fontFileJa);

            const fontFileEn = document.getElementById('input-font-en').files[0];
            if (fontFileEn) currentSettings.fontDataEn = await readFileAsDataURL(fontFileEn);

            const bgFile = document.getElementById('input-bg').files[0];
            if (bgFile) currentSettings.bgData = await readFileAsDataURL(bgFile);

            await localforage.setItem('smartDisplaySettings', currentSettings);
            applyCustomStyles();
            
            fetchLocationName();
            fetchWeather();
            fetchNews();
            globalSeconds = 0; 
            
            document.getElementById('settings-sidebar').classList.remove('open');
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function applyCustomStyles() {
            let styleContent = '';
            document.documentElement.style.setProperty('--curtain-color', currentSettings.curtainColor);
            document.documentElement.style.setProperty('--blur-amount', currentSettings.blurAmount + 'px');
            if (currentSettings.bgData) document.body.style.backgroundImage = `url(${currentSettings.bgData})`;
            if (currentSettings.fontDataJa) {
                styleContent += `@font-face { font-family: 'CustomUserFontJa'; src: url(${currentSettings.fontDataJa}); }`;
                document.documentElement.style.setProperty('--font-ja', "'CustomUserFontJa', sans-serif");
            }
            if (currentSettings.fontDataEn) {
                styleContent += `@font-face { font-family: 'CustomUserFontEn'; src: url(${currentSettings.fontDataEn}); }`;
                document.documentElement.style.setProperty('--font-en', "'CustomUserFontEn', sans-serif");
            }
            document.getElementById('dynamic-styles').textContent = styleContent;

            const panels = document.querySelectorAll('.glass-panel');
            panels.forEach(p => {
                if (currentSettings.glassStyle === 'liquid') p.classList.add('liquid');
                else p.classList.remove('liquid');
            });
        }

        // --- タイマー管理 ---
        let timerEndTime = null;
        let isTimerRunning = false;
        let isTimerVisible = false;
        let timerRemainingMs = 0;

        function switchTimerMode() {
            const mode = document.getElementById('timer-mode-select').value;
            if (mode === 'duration') {
                document.getElementById('timer-duration-inputs').classList.remove('hidden');
                document.getElementById('timer-target-inputs').classList.add('hidden');
            } else {
                document.getElementById('timer-duration-inputs').classList.add('hidden');
                document.getElementById('timer-target-inputs').classList.remove('hidden');
            }
        }

        function startTimer() {
            if (isTimerRunning) return;

            const mode = document.getElementById('timer-mode-select').value;
            let targetTimeMs = 0;

            if (mode === 'duration') {
                const hrs = parseInt(document.getElementById('timer-hours').value) || 0;
                const mins = parseInt(document.getElementById('timer-minutes').value) || 0;
                
                if (timerRemainingMs > 0 && !timerEndTime) {
                    targetTimeMs = Date.now() + timerRemainingMs;
                } else {
                    const totalMs = (hrs * 60 * 60 + mins * 60) * 1000;
                    if (totalMs <= 0) return;
                    targetTimeMs = Date.now() + totalMs;
                }
            } else {
                const targetStr = document.getElementById('timer-target-time').value;
                if (!targetStr) return;
                
                const now = new Date();
                const [targetHrs, targetMins] = targetStr.split(':').map(Number);
                const targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), targetHrs, targetMins, 0);
                
                if (targetDate.getTime() <= now.getTime()) {
                    targetDate.setDate(targetDate.getDate() + 1);
                }
                targetTimeMs = targetDate.getTime();
            }

            timerEndTime = targetTimeMs;
            isTimerRunning = true;
            
            document.getElementById('btn-timer-start').disabled = true;
            document.getElementById('btn-timer-stop').disabled = false;
            document.getElementById('btn-timer-reset').disabled = false;
            document.getElementById('timer-sidebar').classList.remove('open');
        }

        function stopTimer() {
            if (!isTimerRunning) return;
            isTimerRunning = false;
            if (timerEndTime) {
                timerRemainingMs = timerEndTime - Date.now();
                if(timerRemainingMs < 0) timerRemainingMs = 0;
            }
            timerEndTime = null;
            document.getElementById('btn-timer-start').disabled = false;
            document.getElementById('btn-timer-stop').disabled = true;
        }

        function resetTimer() {
            isTimerRunning = false;
            timerEndTime = null;
            timerRemainingMs = 0;
            document.getElementById('btn-timer-start').disabled = false;
            document.getElementById('btn-timer-stop').disabled = true;
            document.getElementById('btn-timer-reset').disabled = true;
        }

        function processTimerDisplay() {
            let remaining = 0;
            let displayStr = "00:00:00";
            
            if (isTimerRunning && timerEndTime) {
                remaining = timerEndTime - Date.now();
            } else if (!isTimerRunning && timerRemainingMs > 0) {
                remaining = timerRemainingMs;
            }

            if (remaining > 0) {
                const totalSeconds = Math.ceil(remaining / 1000);
                const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
                const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
                const s = String(totalSeconds % 60).padStart(2, '0');
                displayStr = `${h}:${m}:${s}`;
                
                if (!isTimerVisible) {
                    playCurtain('timer-ui-container', () => {
                        document.getElementById('timer-ui-panel').style.opacity = '1';
                    });
                    isTimerVisible = true;
                }
                document.getElementById('timer-display').textContent = displayStr;
            } else {
                document.getElementById('timer-display').textContent = "00:00:00";
                if (isTimerRunning) {
                    resetTimer(); 
                }
                if (isTimerVisible) {
                    playCurtain('timer-ui-container', () => {
                        document.getElementById('timer-ui-panel').style.opacity = '0';
                    });
                    isTimerVisible = false;
                }
            }
        }


        // --- データ取得 ---
        let weatherData = null;
        let newsData = [];

        async function fetchLocationName() {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentSettings.lat}&lon=${currentSettings.lon}&zoom=10&accept-language=en`);
                const data = await res.json();
                const city = data.address.city || data.address.town || data.address.village || data.address.county || 'UNKNOWN';
                document.getElementById('location-name-today').textContent = city.toUpperCase();
                document.getElementById('location-name-forecast').textContent = city.toUpperCase();
            } catch (e) {
                document.getElementById('location-name-today').textContent = 'UNKNOWN';
                document.getElementById('location-name-forecast').textContent = 'UNKNOWN';
            }
        }

        function getWeatherDisplay(code) {
            if (code === 0) return 'Sunny';
            if (code === 1 || code === 2 || code === 3) return 'Cloudy';
            if (code >= 45 && code <= 48) return 'Fog';
            if (code >= 51 && code <= 55) return 'Drizzle';
            if (code >= 61 && code <= 65) return 'Rain';
            if (code >= 71 && code <= 77) return 'Snow';
            if (code >= 80 && code <= 82) return 'Showers';
            if (code >= 85 && code <= 86) return 'Snow Showers';
            if (code >= 95 && code <= 99) return 'Thunderstorm';
            return 'Unknown';
        }

        async function fetchWeather() {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentSettings.lat}&longitude=${currentSettings.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia/Tokyo`;
            try {
                const res = await fetch(url);
                weatherData = await res.json();
            } catch (e) {}
        }

        async function fetchNews() {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(currentSettings.rssUrl)}`;
            try {
                const res = await fetch(proxyUrl);
                const json = await res.json();
                const parser = new DOMParser();
                const doc = parser.parseFromString(json.contents, 'application/xml');
                const items = doc.querySelectorAll('item');
                
                let newNewsData = [];
                for (let i = 0; i < items.length && newNewsData.length < 5; i++) {
                    const title = items[i].querySelector('title')?.textContent;
                    const link = items[i].querySelector('link')?.textContent;
                    if (title && link) newNewsData.push({ title, link });
                }
                if (newNewsData.length > 0) newsData = newNewsData;
            } catch (e) {}
        }

        // --- カーテンアニメーション処理 ---
        function playCurtain(containerId, callback) {
            const container = document.getElementById(containerId);
            let curtain = container.querySelector('.curtain-overlay');
            
            curtain.style.transition = 'none';
            curtain.style.transform = 'translateX(-100%)';
            void curtain.offsetWidth; 
            
            curtain.style.transition = 'transform 0.4s ease-in-out';
            curtain.style.transform = 'translateX(0%)';
            
            setTimeout(() => {
                if(callback) callback();
                
                setTimeout(() => {
                    curtain.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        curtain.style.transition = 'none';
                        curtain.style.transform = 'translateX(-100%)';
                    }, 400); 
                }, 50);
            }, 400);
        }

        let globalSeconds = 0;
        let currentMode = null;
        let currentWeatherMode = null;
        let currentNewsIndex = null;
        let isSideClockVisible = false;

        function updateDisplays() {
            try {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                
                const daysEn = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                const monthsEn = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                const dateStr = `${daysEn[now.getDay()]}, ${monthsEn[now.getMonth()]} ${now.getDate()}`;

                document.getElementById('side-time-display').textContent = `${h}:${m}`;
                document.getElementById('side-sec-display').textContent = s;
                document.getElementById('main-time-display').textContent = `${h}:${m}:${s}`;
                document.getElementById('main-date-display').textContent = dateStr;

                processTimerDisplay();

                if (globalSeconds > 0 && globalSeconds % 60 === 0) fetchNews();
                if (globalSeconds > 0 && globalSeconds % 3600 === 0) fetchWeather();

                const tSec = currentSettings.timeSec;
                const wSec = currentSettings.weatherSec;
                const nSec = currentSettings.newsSec;
                const totalCycle = tSec + wSec + nSec;
                const cycleSec = globalSeconds % totalCycle;
                
                let nextMode = '';
                let nextWeatherMode = '';
                let nextNewsIndex = 0;
                
                if (cycleSec < tSec) {
                    nextMode = 'time';
                } else if (cycleSec < tSec + wSec) {
                    nextMode = 'weather';
                    nextWeatherMode = ((cycleSec - tSec) < wSec / 2) ? 'today' : 'forecast';
                } else {
                    nextMode = 'news';
                    const passedNSec = cycleSec - (tSec + wSec);
                    nextNewsIndex = Math.floor(passedNSec / (nSec / 3));
                    if (newsData.length > 0) nextNewsIndex = nextNewsIndex % newsData.length;
                    else nextNewsIndex = 0;
                }

                const nextSideClockVisible = (nextMode !== 'time');

                const mainNeedsCurtain = (currentMode !== nextMode) || (nextMode === 'weather' && currentWeatherMode !== nextWeatherMode) || (nextMode === 'news' && currentNewsIndex !== nextNewsIndex);
                const sideNeedsCurtain = (isSideClockVisible !== nextSideClockVisible);

                if (mainNeedsCurtain) {
                    playCurtain('main-ui-panel', () => { applyMainContentDOM(nextMode, nextWeatherMode, nextNewsIndex); });
                    currentMode = nextMode; currentWeatherMode = nextWeatherMode; currentNewsIndex = nextNewsIndex;
                } else if (currentMode === null) {
                    applyMainContentDOM(nextMode, nextWeatherMode, nextNewsIndex);
                    currentMode = nextMode;
                }

                if (sideNeedsCurtain) {
                    playCurtain('side-ui-container', () => {
                        document.getElementById('side-ui-panel').style.opacity = nextSideClockVisible ? '1' : '0';
                    });
                    isSideClockVisible = nextSideClockVisible;
                } else if (isSideClockVisible && document.getElementById('side-ui-panel').style.opacity === '0') {
                    document.getElementById('side-ui-panel').style.opacity = '1';
                }

            } catch (e) { console.error(e); } finally { globalSeconds++; }
        }

        function applyMainContentDOM(mode, weatherMode, newsIndex) {
            const pTime = document.getElementById('mode-time');
            const pWeather = document.getElementById('mode-weather');
            const pNews = document.getElementById('mode-news');
            
            pTime.classList.remove('active'); pWeather.classList.remove('active'); pNews.classList.remove('active');
            
            if (mode === 'time') pTime.classList.add('active');
            if (mode === 'weather') {
                pWeather.classList.add('active');
                const pToday = document.getElementById('weather-today');
                const pForecast = document.getElementById('weather-forecast');
                
                if (weatherMode === 'today') {
                    pToday.classList.add('active'); pForecast.classList.remove('active');
                    if (weatherData && weatherData.current_weather) {
                        const cw = weatherData.current_weather;
                        const daily = weatherData.daily;
                        document.getElementById('wt-desc').textContent = getWeatherDisplay(cw.weathercode);
                        document.getElementById('wt-temp').textContent = `${cw.temperature}°C`;
                        document.getElementById('wt-max').textContent = `${daily.temperature_2m_max[0]}°C`;
                        document.getElementById('wt-min').textContent = `${daily.temperature_2m_min[0]}°C`;
                    }
                } else {
                    pToday.classList.remove('active'); pForecast.classList.add('active');
                    if (weatherData && weatherData.daily) {
                        const daily = weatherData.daily;
                        const box = document.getElementById('forecast-box');
                        box.innerHTML = ''; 
                        for (let i = 1; i <= 5; i++) {
                            const dateObj = new Date(daily.time[i]);
                            const dStr = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                            const wText = getWeatherDisplay(daily.weathercode[i]);
                            const maxT = daily.temperature_2m_max[i];
                            const minT = daily.temperature_2m_min[i];

                            box.insertAdjacentHTML('beforeend', `
                                <div class="forecast-item">
                                    <div class="forecast-date en-font">${dStr}</div>
                                    <div class="forecast-desc en-font">${wText}</div>
                                    <div class="forecast-temp en-font"><span class="temp-max">${maxT}°</span> / <span class="temp-min">${minT}°</span></div>
                                </div>
                            `);
                        }
                    }
                }
            }
            if (mode === 'news') {
                pNews.classList.add('active');
                if (newsData.length > 0 && newsData[newsIndex]) {
                    const item = newsData[newsIndex];
                    document.getElementById('news-title-display').textContent = item.title;
                    qr.set({ value: item.link });
                } else {
                    document.getElementById('news-title-display').textContent = 'Loading news...';
                }
            }
        }

        let touchstartX = 0;
        let swipeTarget = null;

        document.addEventListener('touchstart', e => { 
            touchstartX = e.changedTouches[0].screenX; 
            if (touchstartX < 50) swipeTarget = 'left';
            else if (touchstartX > window.innerWidth - 50) swipeTarget = 'right';
            else swipeTarget = null;
        });

        document.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            let diff = touchendX - touchstartX;
            
            if (swipeTarget === 'left' && diff > 50) {
                document.getElementById('settings-sidebar').classList.add('open');
            }
            if (diff < -50 && document.getElementById('settings-sidebar').classList.contains('open')) {
                document.getElementById('settings-sidebar').classList.remove('open');
            }

            if (swipeTarget === 'right' && diff < -50) {
                document.getElementById('timer-sidebar').classList.add('open');
            }
            if (diff > 50 && document.getElementById('timer-sidebar').classList.contains('open')) {
                document.getElementById('timer-sidebar').classList.remove('open');
            }
        });

        loadSettings().then(() => {
            setInterval(updateDisplays, 1000);
            updateDisplays();
        });

    </script>
</body>
</html>
